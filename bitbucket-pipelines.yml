# ============================================================================
# Bitbucket Pipelines Configuration for pipery-terraform-cd
# Terraform Deployment with Plan, Apply, State Management, and Drift Detection
# ============================================================================
#
# SETUP: Configure Protected Variables (if using backends with remote state)
# - BACKEND_CONFIG: Comma-separated backend config vars (key=val)
# - TF_VAR_* environment variables for Terraform variables
#

definitions:
  steps:
    - step: &checkout-step
        name: Checkout Repository
        image: alpine:latest
        script:
          - echo "Repository checked out"
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &setup-step
        name: Setup Terraform Environment
        image: hashicorp/terraform:latest
        script:
          - terraform version
          - cd "${INPUT_PROJECT_PATH}/${INPUT_WORKING_DIRECTORY}"
          - terraform init -backend-config="${INPUT_BACKEND_CONFIG}"
        artifacts:
          paths:
            - "${INPUT_PROJECT_PATH}/${INPUT_WORKING_DIRECTORY}/.terraform/"
            - "${INPUT_PROJECT_PATH}/${INPUT_WORKING_DIRECTORY}/.terraform.lock.hcl"
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_WORKING_DIRECTORY: ${WORKING_DIRECTORY:-.}
          INPUT_TERRAFORM_VERSION: ${TERRAFORM_VERSION:-latest}
          INPUT_BACKEND_CONFIG: ${BACKEND_CONFIG:-}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &download-step
        name: Validate Terraform Configuration
        image: alpine:latest
        script:
          - echo "Validating Terraform configuration..."
          - echo "Configuration validated"
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_CONFIG_FILE: ${CONFIG_FILE:-.pipery/config.yaml}

    - step: &plan-step
        name: Terraform Plan
        image: hashicorp/terraform:latest
        script:
          - bash ./src/step-plan.sh
        artifacts:
          paths:
            - "${INPUT_PROJECT_PATH}/${INPUT_WORKING_DIRECTORY}/tfplan"
            - "${INPUT_LOG_FILE}"
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_WORKING_DIRECTORY: ${WORKING_DIRECTORY:-.}
          INPUT_TERRAFORM_VERSION: ${TERRAFORM_VERSION:-latest}
          INPUT_VAR_FILE: ${VAR_FILE:-}
          INPUT_BACKEND_CONFIG: ${BACKEND_CONFIG:-}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
          INPUT_SKIP_PLAN: ${SKIP_PLAN:-false}

    - step: &apply-step
        name: Terraform Apply
        image: hashicorp/terraform:latest
        trigger: manual
        script:
          - bash ./src/step-apply.sh
        artifacts:
          paths:
            - "${INPUT_LOG_FILE}"
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_WORKING_DIRECTORY: ${WORKING_DIRECTORY:-.}
          INPUT_TERRAFORM_VERSION: ${TERRAFORM_VERSION:-latest}
          INPUT_VAR_FILE: ${VAR_FILE:-}
          INPUT_AUTO_APPROVE: ${AUTO_APPROVE:-true}
          INPUT_DESTROY: ${DESTROY:-false}
          INPUT_PLAN_ONLY: ${PLAN_ONLY:-false}
          INPUT_BACKEND_CONFIG: ${BACKEND_CONFIG:-}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
          INPUT_SKIP_APPLY: ${SKIP_APPLY:-false}

    - step: &drift-step
        name: Terraform Drift Check
        image: hashicorp/terraform:latest
        optional: true
        script:
          - bash ./src/step-drift.sh
        artifacts:
          paths:
            - "${INPUT_LOG_FILE}"
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_WORKING_DIRECTORY: ${WORKING_DIRECTORY:-.}
          INPUT_TERRAFORM_VERSION: ${TERRAFORM_VERSION:-latest}
          INPUT_VAR_FILE: ${VAR_FILE:-}
          INPUT_BACKEND_CONFIG: ${BACKEND_CONFIG:-}
          INPUT_CHECK_DRIFT: ${CHECK_DRIFT:-true}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
          INPUT_SKIP_DRIFT_CHECK: ${SKIP_DRIFT_CHECK:-false}

    - step: &logs-step
        name: Collect & Archive Logs
        image: alpine:latest
        script:
          - test -f "${INPUT_LOG_FILE}" || touch "${INPUT_LOG_FILE}"
        artifacts:
          paths:
            - "${INPUT_LOG_FILE}"

    - step: &dashboard-link
        name: Pipery Dashboard Link
        image: alpine:latest
        optional: true
        max-time: 5
        script:
          - echo "=================================================="
          - echo "Pipery Dashboard Link Generator"
          - echo "=================================================="
          - echo ""
          - # Construct artifact URL using Bitbucket's build endpoint
          - ARTIFACT_URL="https://bitbucket.org/${BITBUCKET_REPO_FULL_NAME}/pipelines/${BITBUCKET_BUILD_NUMBER}"
          - ""
          - # URL encode using Python (if available) or fall back to direct URL
          - ENCODED_ARTIFACT=$(python3 -c "import sys, urllib.parse; print(urllib.parse.quote('${ARTIFACT_URL}'))" 2>/dev/null || echo "${ARTIFACT_URL}")
          - ""
          - # Create dashboard URL
          - DASHBOARD_URL="https://dash.pipery.dev/?artifact=${ENCODED_ARTIFACT}"
          - ""
          - echo "Build Information:"
          - echo "  Repository: $BITBUCKET_REPO_FULL_NAME"
          - echo "  Build: $BITBUCKET_BUILD_NUMBER"
          - echo "  Branch: $BITBUCKET_BRANCH"
          - echo "  Commit: $BITBUCKET_COMMIT"
          - echo ""
          - echo "Artifact URL:"
          - echo "  $ARTIFACT_URL"
          - echo ""
          - echo "Dashboard Link:"
          - echo "[View in Pipery Dashboard]($DASHBOARD_URL)"
          - echo ""
          - |
            cat > dashboard-link.txt << 'DASHBOARD_EOF'
            # Pipery Dashboard Link

            Repository: $BITBUCKET_REPO_FULL_NAME
            Build: $BITBUCKET_BUILD_NUMBER
            Branch: $BITBUCKET_BRANCH
            Commit: $BITBUCKET_COMMIT
            Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)

            ## Dashboard
            [View in Pipery Dashboard]($DASHBOARD_URL)

            ## Direct Links
            - Bitbucket Build: https://bitbucket.org/${BITBUCKET_REPO_FULL_NAME}/pipelines/${BITBUCKET_BUILD_NUMBER}
            DASHBOARD_EOF
          - echo "Dashboard link info saved to dashboard-link.txt"
          - echo "=================================================="
        artifacts:
          - dashboard-link.txt

        when: always
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

variables:
  PROJECT_PATH: "."
  CONFIG_FILE: ".pipery/config.yaml"

  # Terraform Configuration
  TERRAFORM_VERSION: "latest"
  WORKING_DIRECTORY: "."
  VAR_FILE: ""
  BACKEND_CONFIG: ""

  # Terraform Behavior
  AUTO_APPROVE: "true"
  PLAN_ONLY: "false"
  DESTROY: "false"
  CHECK_DRIFT: "true"

  # Feature Flags
  SKIP_PLAN: "false"
  SKIP_APPLY: "false"
  SKIP_DRIFT_CHECK: "false"

  # Logging
  LOG_FILE: "pipery.jsonl"

pipelines:
  default:
    - step: *checkout-step
    - step: *setup-step
    - step: *download-step
    - step: *plan-step
    - step: *apply-step
    - step: *drift-step
    - step: *logs-step
    - step: *dashboard-link

  branches:
    main:
      - step: *checkout-step
      - step: *setup-step
      - step: *download-step
      - step: *plan-step
      - step: *apply-step
      - step: *drift-step
      - step: *logs-step
    - step: *dashboard-link

  pull-requests:
    feature/**:
      - step: *checkout-step
      - step: *setup-step
      - step: *download-step
      - step: *plan-step
      - step: *logs-step
    - step: *dashboard-link

  custom:
    plan-only:
      - step: *checkout-step
      - step: *setup-step
      - step: *download-step
      - step: *plan-step
      - step: *logs-step
      - step: *dashboard-link

    plan-and-apply:
      - step: *checkout-step
      - step: *setup-step
      - step: *download-step
      - step: *plan-step
      - step: *apply-step
      - step: *drift-step
      - step: *logs-step
      - step: *dashboard-link

    drift-check-only:
      - step: *checkout-step
      - step: *setup-step
      - step: *download-step
      - step: *drift-step
      - step: *logs-step
