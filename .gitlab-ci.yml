# GitLab CI Pipeline for pipery-terraform-cd
# Terraform deployment with plan, apply, state management, and drift detection.

variables:
  PROJECT_PATH: "."
  CONFIG_FILE: ".pipery/config.yaml"
  INPUT_PROJECT_PATH: "."
  INPUT_CONFIG_FILE: ".pipery/config.yaml"
  INPUT_TERRAFORM_VERSION: "latest"
  INPUT_BACKEND_CONFIG: ""
  INPUT_VAR_FILE: ""
  INPUT_WORKING_DIRECTORY: "."
  INPUT_PLAN_ONLY: "false"
  INPUT_AUTO_APPROVE: "true"
  INPUT_DESTROY: "false"
  INPUT_CHECK_DRIFT: "true"
  INPUT_SKIP_PLAN: "false"
  INPUT_SKIP_APPLY: "false"
  INPUT_SKIP_DRIFT_CHECK: "false"
  INPUT_LOG_FILE: "pipery.jsonl"

stages:
  - checkout
  - setup
  - download
  - plan
  - apply
  - drift
  - logs

checkout:
  stage: checkout
  image: alpine:latest
  script:
    - echo "Repository checked out"

setup:
  stage: setup
  image: hashicorp/terraform:latest
  script:
    - terraform version
    - cd "${INPUT_PROJECT_PATH}/${INPUT_WORKING_DIRECTORY}"
    - terraform init
  artifacts:
    paths:
      - "${INPUT_PROJECT_PATH}/${INPUT_WORKING_DIRECTORY}/.terraform/"
      - "${INPUT_PROJECT_PATH}/${INPUT_WORKING_DIRECTORY}/.terraform.lock.hcl"
    expire_in: 1 day

download:
  stage: download
  image: alpine:latest
  script:
    - echo "Validating Terraform configuration..."
    - echo "Configuration validated"

plan:
  stage: plan
  image: hashicorp/terraform:latest
  script:
    - ./src/step-plan.sh
  rules:
    - if: '$INPUT_SKIP_PLAN == "true"'
      when: never
    - when: on_success
  artifacts:
    paths:
      - "${INPUT_PROJECT_PATH}/${INPUT_WORKING_DIRECTORY}/tfplan"
      - "$INPUT_LOG_FILE"
    expire_in: 30 days

apply:
  stage: apply
  image: hashicorp/terraform:latest
  script:
    - ./src/step-apply.sh
  rules:
    - if: '$INPUT_SKIP_APPLY == "true"'
      when: never
    - when: manual
  artifacts:
    paths:
      - "$INPUT_LOG_FILE"
    expire_in: 30 days

drift_check:
  stage: drift
  image: hashicorp/terraform:latest
  script:
    - ./src/step-drift.sh
  allow_failure: true
  rules:
    - if: '$INPUT_SKIP_DRIFT_CHECK == "true" || $INPUT_CHECK_DRIFT != "true"'
      when: never
    - when: on_success
  artifacts:
    paths:
      - "$INPUT_LOG_FILE"
    expire_in: 30 days

collect_logs:
  stage: logs
  image: alpine:latest
  script:
    - test -f "${INPUT_LOG_FILE}" || touch "${INPUT_LOG_FILE}"
  artifacts:
    paths:
      - "$INPUT_LOG_FILE"
    expire_in: 30 days
  when: always

# ============================================================================
# DASHBOARD LINK GENERATION
# ============================================================================

dashboard_link:
  stage: logs
  image: alpine:latest
  needs:
    - publish_logs
  script:
    - echo "Generating Pipery Dashboard link..."
    - |
      # Get the artifact URL from GitLab API
      ARTIFACT_URL="${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/jobs/${CI_JOB_ID}/artifacts"
      echo "Artifact URL: $ARTIFACT_URL"
      
      # URL encode the artifact path
      ENCODED_URL=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1],safe=''))" "$ARTIFACT_URL")
      
      # Create dashboard link
      DASHBOARD_URL="https://dash.pipery.dev/?artifact=${ENCODED_URL}"
      
      # Output the link in markdown format
      echo ""
      echo "=========================================="
      echo "Pipery Dashboard Link"
      echo "=========================================="
      echo "[$DASHBOARD_URL]($DASHBOARD_URL)"
      echo ""
      echo "Direct URL:"
      echo "$DASHBOARD_URL"
      echo "=========================================="
      echo ""
      
      # Save to artifact file for persistence
      mkdir -p artifacts
      echo "DASHBOARD_URL=$DASHBOARD_URL" > artifacts/dashboard_link.env
  artifacts:
    paths:
      - artifacts/
    reports:
      dotenv: artifacts/dashboard_link.env
    expire_in: 90 days
  allow_failure: true
  when: always
