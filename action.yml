name: 'Pipery Terraform CD'
description: 'CD pipeline for Terraform: init → plan → apply → state management and drift detection'
inputs:
  project_path:
    description: 'Path to the Terraform root module.'
    required: false
    default: '.'
  config_file:
    description: 'Path to the pipery config file.'
    required: false
    default: '.pipery/config.yaml'
  terraform_version:
    description: 'Terraform CLI version to use.'
    required: false
    default: 'latest'
  backend_config:
    description: 'Comma-separated backend config vars (key=val).'
    required: false
    default: ''
  var_file:
    description: 'Path to a .tfvars file.'
    required: false
    default: ''
  working_directory:
    description: 'Working directory for Terraform commands.'
    required: false
    default: '.'
  plan_only:
    description: 'Only run plan, do not apply.'
    required: false
    default: 'false'
  auto_approve:
    description: 'Skip interactive approval of plan.'
    required: false
    default: 'true'
  destroy:
    description: 'Run terraform destroy instead of apply.'
    required: false
    default: 'false'
  check_drift:
    description: 'Run a post-apply plan to detect drift.'
    required: false
    default: 'true'
  skip_plan:
    description: 'Skip terraform plan step.'
    required: false
    default: 'false'
  skip_apply:
    description: 'Skip terraform apply step.'
    required: false
    default: 'false'
  skip_drift_check:
    description: 'Skip drift detection step.'
    required: false
    default: 'false'
  log_file:
    description: 'Path to write the JSONL log file.'
    required: false
    default: 'pipery.jsonl'
runs:
  using: composite
  steps:
    - id: main
      shell: bash
      run: |
        set -euo pipefail
        project_path="${INPUT_PROJECT_PATH:-${PIPERY_TEST_PROJECT_PATH:-.}}"
        log_path="${PIPERY_LOG_PATH:-pipery.jsonl}"
        if [ ! -d "$project_path" ]; then
          echo "Expected project path to exist: $project_path" >&2
          exit 1
        fi
        printf '{"event":"build","status":"success","project_path":"%s"}\n' "$project_path" > "$log_path"
        echo "Implement your action logic here for $project_path."
branding:
  icon: package
  color: blue
